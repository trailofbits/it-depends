name: Integration tests

on:
  # Weekly schedule
  schedule:
    - cron: "0 0 * * 1"
  # Run on push to master branch
  push:
    branches:
      - master
  # Run on labeled pull requests
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  integration:
    # Run on schedule or pull request with 'integration' label
    if: |
      (github.event_name == 'schedule' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'integration'))
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y apt-file cmake automake golang cargo npm clang
          sudo apt-file update

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies from uv.lock
        run: make sync

      - name: integration
        run: make integration