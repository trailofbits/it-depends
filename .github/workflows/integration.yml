name: Integration tests

on:
  # Weekly schedule
  schedule:
    - cron: "0 0 * * 1"
  # Run on push to master branch
  push:
    branches:
      - master
  # Run on labeled pull requests
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  integration:
    # Run on schedule or pull request with 'integration' label
    if: |
      (github.event_name == 'schedule' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'integration'))
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y apt-file cmake automake golang cargo npm clang
          sudo apt-file update

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Install dependencies from uv.lock
        run: make sync

      - name: integration
        run: make integration

  # When the *scheduled* run fails, surface it as a deduplicated issue rather than a
  # silently-ignored red X. A scheduled failure usually means upstream registry drift
  # (a yanked or retroactively-edited version) rather than an it-depends regression.
  report-drift:
    needs: integration
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Open or update drift issue
        run: |
          gh label create integration-drift --force \
            --color B60205 \
            --description "Scheduled integration tests detected dependency-resolution drift" || true
          body=$'Scheduled integration tests failed: '"${RUN_URL}"$'\n\nThis usually means upstream dependency-resolution drift (a yanked or retroactively-edited package version) rather than an it-depends regression. Review the failing run; if the change reflects legitimate upstream drift, re-baseline test/repos/*.expected.json via test/rebuild_expected_output.py.'
          existing="$(gh issue list --label integration-drift --state open --json number --jq '.[0].number')"
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" --body "${body}"
          else
            gh issue create --title "Integration tests: dependency drift detected" \
              --label integration-drift --body "${body}"
          fi
