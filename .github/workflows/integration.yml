name: Integration tests

on:
  # Weekly schedule
  schedule:
    - cron: "0 0 * * 1"
  # Run on push to master branch
  push:
    branches:
      - master
  # Run on labeled pull requests
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  integration:
    # Run on schedule or pull request with 'integration' label
    if: |
      (github.event_name == 'schedule' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'integration'))
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt update -y
          sudo apt install -y apt-file cmake automake golang cargo npm clang
          sudo apt-file update

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: integration
        run: make integration